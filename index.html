<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB-VIP Evaluation Tools</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2e4a;
  --navy-mid:#1e3a5f;
  --navy-light:#2c5282;
  --navy-pale:#ebf0f7;
  --accent:#2b6cb0;
  --accent-light:#e8f1fb;
  --text:#1a202c;
  --text-mid:#4a5568;
  --text-light:#718096;
  --border:#e2e8f0;
  --border-mid:#cbd5e0;
  --bg:#f7f9fc;
  --white:#ffffff;
  --amber-bg:#fffbeb;
  --amber-tx:#92400e;
  --amber-bd:#f59e0b;
  --green-bg:#f0fff4;
  --green-tx:#276749;
  --red-bg:#fff5f5;
  --red-tx:#9b2c2c;
  --radius:8px;
  --radius-sm:5px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* ── Header ───────────────────────────────────────────────────────────── */
.header{background:var(--navy);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-left{display:flex;flex-direction:column;gap:2px}
.header h1{font-size:1.25rem;font-weight:600;letter-spacing:-.01em}
.header-sub{font-size:11px;color:rgba(255,255,255,.65);font-weight:400}
.header-meta{font-size:11px;color:rgba(255,255,255,.5);text-align:right;line-height:1.6}

/* ── Layout ───────────────────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:230px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:1rem;display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:0}
.main{flex:1;padding:1rem;display:flex;flex-direction:column;gap:.75rem;min-width:0;overflow:hidden}

/* ── Sidebar filters ──────────────────────────────────────────────────── */
.filter-section h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);margin-bottom:.5rem}
.filter-group{display:flex;flex-direction:column;gap:2px}
.fc{display:flex;align-items:center;gap:7px;cursor:pointer;padding:4px 6px;border-radius:var(--radius-sm);transition:background .1s}
.fc:hover{background:var(--navy-pale)}
.fc input{cursor:pointer;width:13px;height:13px;flex-shrink:0;accent-color:var(--accent)}
.fc-label{font-size:12px;color:var(--text);line-height:1.3;flex:1}
.fc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fc-count{font-size:10px;color:var(--text-light);flex-shrink:0;background:var(--bg);padding:1px 5px;border-radius:8px}
.sidebar-divider{height:1px;background:var(--border);margin:.25rem 0}
.clear-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px;font-weight:500}
.clear-btn:hover{text-decoration:underline}

/* ── Toolbar ──────────────────────────────────────────────────────────── */
.toolbar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border-mid);border-radius:var(--radius);font-size:13px;background:var(--white);color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:14px}
.result-count{font-size:12px;color:var(--text-light);white-space:nowrap}
.print-btn{background:var(--white);border:1px solid var(--border-mid);border-radius:var(--radius);padding:7px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--text-mid);white-space:nowrap;transition:all .15s}
.print-btn:hover{background:var(--navy-pale);border-color:var(--accent);color:var(--accent)}

/* ── Compare bar ──────────────────────────────────────────────────────── */
.compare-bar{background:var(--white);border:1px solid var(--border-mid);border-radius:var(--radius);padding:.6rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.compare-bar-label{font-size:12px;font-weight:500;color:var(--text-mid);white-space:nowrap}
.compare-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.cpill{background:var(--navy-pale);border:1px solid var(--accent-light);border-radius:20px;padding:2px 10px;font-size:11px;display:flex;align-items:center;gap:5px;color:var(--navy-mid)}
.cpill button{background:none;border:none;cursor:pointer;color:var(--text-light);line-height:1;padding:0;font-size:14px}
.cpill button:hover{color:var(--text)}
.compare-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:500;transition:background .15s}
.compare-btn:hover{background:var(--navy-light)}
.compare-btn:disabled{background:var(--border-mid);color:var(--text-light);cursor:not-allowed}
.compare-hint{font-size:11px;color:var(--text-light)}

/* ── Cards grid ───────────────────────────────────────────────────────── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;overflow-y:auto;max-height:calc(100vh - 200px);padding-bottom:1rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:7px;transition:box-shadow .15s,border-color .15s;cursor:default}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--border-mid)}
.card.selected{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(43,108,176,.1)}
.card-header{display:flex;align-items:flex-start;gap:8px}
.card-check{width:15px;height:15px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);cursor:pointer}
.card-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;color:var(--text)}
.domain-badges{display:flex;flex-wrap:wrap;gap:4px}
.db{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;line-height:1.4}
.db i{font-size:10px}
.card-desc{font-size:12px;color:var(--text-mid);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-clamp:3;overflow:hidden}
.card-meta{display:flex;gap:5px;flex-wrap:wrap}
.meta-pill{font-size:10px;color:var(--text-light);background:var(--bg);border-radius:6px;padding:2px 7px;display:flex;align-items:center;gap:3px}
.meta-pill i{font-size:10px}
.meta-pill.free{color:var(--green-tx);background:var(--green-bg)}
.meta-pill.paid{color:var(--accent);background:var(--accent-light)}
.flag-note{font-size:11px;color:var(--amber-tx);background:var(--amber-bg);border-radius:var(--radius-sm);padding:4px 8px;display:flex;align-items:flex-start;gap:5px;border-left:2px solid var(--amber-bd)}
.flag-note i{font-size:11px;flex-shrink:0;margin-top:1px}
.expand-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;text-align:left;font-weight:500;display:flex;align-items:center;gap:4px}
.expand-btn:hover{text-decoration:underline}
.detail-panel{border-top:1px solid var(--border);padding-top:.75rem;margin-top:2px;display:flex;flex-direction:column;gap:6px}
.detail-row{display:grid;grid-template-columns:95px 1fr;gap:6px;font-size:11px}
.detail-label{color:var(--text-light);font-weight:500;padding-top:1px}
.detail-value{color:var(--text);line-height:1.5;word-break:break-word}
.detail-flag{color:var(--amber-tx);font-weight:500}
.empty-state{grid-column:1/-1;padding:3rem;text-align:center;color:var(--text-light)}
.empty-state i{font-size:2rem;margin-bottom:.75rem;display:block;opacity:.4}
.empty-state p{font-size:13px}

/* ── Compare modal ────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);width:min(96vw,920px);max-height:90vh;overflow:auto;box-shadow:var(--shadow-md)}
.modal-header{background:var(--navy);color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1}
.modal-header h2{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8);font-size:20px;line-height:1;padding:0}
.modal-close:hover{color:#fff}
.modal-body{padding:1.25rem;overflow-x:auto}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.compare-table th{background:var(--navy-pale);font-weight:600;padding:8px 10px;text-align:left;border:1px solid var(--border);font-size:11px;color:var(--navy-mid);white-space:nowrap}
.compare-table th:first-child{background:transparent;border:none}
.compare-table td{padding:8px 10px;border:1px solid var(--border);vertical-align:top;line-height:1.5;color:var(--text)}
.compare-table .row-label{font-weight:500;color:var(--text-light);background:var(--bg);white-space:nowrap;font-size:11px;border-right:2px solid var(--border-mid)}
.compare-table tr:hover td{background:var(--navy-pale)}
.compare-table tr:hover .row-label{background:var(--bg)}

/* ── Print styles ─────────────────────────────────────────────────────── */
@media print{
  .sidebar,.toolbar,.compare-bar,.expand-btn,.card-check,.print-btn,.header-meta{display:none!important}
  .layout{display:block}
  .main{padding:0}
  .cards{display:block;max-height:none;overflow:visible}
  .card{break-inside:avoid;border:1px solid #ccc;margin-bottom:.75rem;box-shadow:none;page-break-inside:avoid}
  .card.selected,.card{display:flex!important}
  .detail-panel{display:flex!important}
  .header{background:#1a2e4a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{font-size:11px}
  .domain-badges,.card-meta,.flag-note{display:flex!important}
  @page{margin:1.5cm}
}

/* ── Mobile ───────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:none;position:relative;border-right:none;border-bottom:1px solid var(--border);padding:.75rem}
  .sidebar-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:.25rem 0}
  .sidebar-content{display:none}
  .sidebar-content.open{display:flex;flex-direction:column;gap:1rem;margin-top:.75rem}
  .filter-sections{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .cards{max-height:none;grid-template-columns:1fr}
  .main{padding:.75rem}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{min-width:unset}
  .compare-bar{flex-direction:column;align-items:flex-start}
  .header{padding:.75rem 1rem}
  .header h1{font-size:1rem}
}
@media(max-width:480px){
  .filter-sections{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <h1>CB-VIP Evaluation Tools</h1>
    <div class="header-sub">Violence Prevention Research Lab &nbsp;·&nbsp; School of Social Work, University of Illinois Urbana-Champaign</div>
  </div>
  <div class="header-meta">
    Created by Terra Salgado<br>
    Last updated: June 17, 2026
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <!-- Mobile toggle -->
    <div class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle">
      <span style="font-size:13px;font-weight:600;color:var(--text-mid)">Filters</span>
      <i class="fa fa-chevron-down" id="sidebar-icon" style="font-size:11px;color:var(--text-light)"></i>
    </div>

    <div class="sidebar-content" id="sidebar-content">
      <div class="filter-sections" id="filter-sections">

        <div class="filter-section">
          <h3>Outcome domain</h3>
          <div class="filter-group" id="domain-filters"></div>
        </div>

        <div class="filter-section">
          <h3>Population</h3>
          <div class="filter-group" id="pop-filters"></div>
        </div>

        <div class="filter-section">
          <h3>Report type</h3>
          <div class="filter-group" id="report-filters"></div>
        </div>

        <div class="filter-section">
          <h3>Cost</h3>
          <div class="filter-group" id="cost-filters"></div>
        </div>

        <div class="filter-section">
          <h3>Options</h3>
          <div class="filter-group">
            <label class="fc"><input type="checkbox" id="hide-flagged" onchange="render()"> <span class="fc-label">Hide flagged instruments</span></label>
            <label class="fc"><input type="checkbox" id="free-only" onchange="render()"> <span class="fc-label">Free only</span></label>
          </div>
        </div>

      </div>
      <button class="clear-btn" onclick="clearAll()"><i class="fa fa-rotate-left"></i> Clear all filters</button>
    </div>

  </aside>

  <!-- Main content -->
  <main class="main">

    <div class="toolbar">
      <div class="search-wrap">
        <i class="fa fa-search"></i>
        <input type="text" id="search-input" placeholder="Search instruments by name, keyword, or domain..." oninput="render()" autocomplete="off">
      </div>
      <span class="result-count" id="result-count"></span>
      <button class="print-btn" onclick="window.print()"><i class="fa fa-print"></i> Print / Save PDF</button>
    </div>

    <div class="compare-bar" id="compare-bar" style="display:none">
      <span class="compare-bar-label">Comparing:</span>
      <div class="compare-pills" id="compare-pills"></div>
      <span class="compare-hint" id="compare-hint"></span>
      <button class="compare-btn" id="compare-btn" onclick="openCompare()" disabled>Compare</button>
    </div>

    <div class="cards" id="cards-grid"></div>

  </main>
</div>

<!-- Compare modal -->
<div class="overlay" id="compare-overlay" onclick="if(event.target===this)closeCompare()">
  <div class="modal">
    <div class="modal-header">
      <h2>Instrument Comparison</h2>
      <button class="modal-close" onclick="closeCompare()">×</button>
    </div>
    <div class="modal-body" id="compare-body"></div>
  </div>
</div>

Adults","Children (Under 12)","Youth / Adolescents"],"cost":"Free"},{"name":"Developmental Assets Measures (Search Institute)","item_count":"18 individual asset measures across 8 asset categories (varies by version; based on the Profiles of Student Life: Attitudes and Behaviors Survey)","section":"Section VI: Multi-Domain and Comprehensive Assessment Tools","construct":"Positive youth development / developmental assets (internal and external)","what_it_measures":"Internal and external developmental assets across eight categories: support, empowerment, boundaries and expectations, constructive use of time (external); commitment to learning, positive values, social competencies, and positive identity (internal). Validated across grades 6–12 and demonstrated measurement invariance across gender, race/ethnicity, sexual orientation, and parent education levels.","target_population":"Adolescents in grades 6–12","report_type":"Self-report","citation":"Syvertsen, A. K., Scales, P. C., & Toomey, R. B. (2021). Developmental Assets framework revisited: Confirmatory analysis and invariance testing to create a new generation of assets measures for applied research. Applied Developmental Science, 25(4), 291–306. https://doi.org/10.1080/10888691.2019.1613155","cost_access":"Contact Search Institute. https://www.search-institute.org. Survey instrument available through Search Institute licensing.","source":"Syvertsen, A. K., Scales, P. C., & Toomey, R. B. (2021). Applied Developmental Science, 25(4), 291–306.","exclude_from_tool":false,"flags":[],"outcome_domains":["Caregiver Support & Parenting Capacity","Education & Academic Engagement","Economic Mobility & Civic Engagement"],"population_tags":["Youth / Adolescents"],"cost":"Contact publisher"},{"name":"Youth Assessment and Screening Instrument (YASI)","item_count":"Approximately 130+ items across 12 sections","section":"Section VI: Multi-Domain and Comprehensive Assessment Tools","construct":"Juvenile justice risk/needs assessment (multi-domain)","what_it_measures":"Risk and needs across 12 domains: offense history, family, basic needs, school, community and peers, alcohol and drugs, mental health, physical health, aggression, attitudes, skills, and employment/free time. Designed to assess risk of reoffending and identify intervention targets for juvenile justice-involved youth. Includes both static (historical) and dynamic (changeable) risk factors.","target_population":"Youth involved in or at risk for involvement with the juvenile justice system","report_type":"Clinician / Worker","citation":"Orbis Partners. Youth Assessment and Screening Instrument (YASI). Orbis Partners Inc.","cost_access":"Proprietary instrument. Contact Orbis Partners Inc. for licensing and training requirements. http://www.orbispartners.com","source":"Orbis Partners Inc. YASI Full Assessment.","exclude_from_tool":false,"flags":[],"outcome_domains":["Economic Mobility & Civic Engagement","Justice Involvement, Delinquency & Legal Navigation","Mental Health, Trauma & Coping","Violence, Gang Risk & Community Safety"],"population_tags":["Adults","Youth / Adolescents"],"cost":"Contact publisher"}];
// ── Domain color system ──────────────────────────────────────────────────
const DOMAIN_CONFIG = {
  "Violence, Gang Risk & Community Safety":
    {bg:"#FFE8E8",tx:"#8B1A1A",ic:"fa-shield-halved"},
  "Justice Involvement, Delinquency & Legal Navigation":
    {bg:"#FFF4CC",tx:"#7A5500",ic:"fa-scale-balanced"},
  "Mental Health, Trauma & Coping":
    {bg:"#EDE8FD",tx:"#4A2E99",ic:"fa-heart"},
  "Social-Emotional Skills, Regulation & Conflict Resolution":
    {bg:"#D6F5EC",tx:"#0A5C42",ic:"fa-face-smile"},
  "Relationships, Connection & Belonging":
    {bg:"#D6EEFF",tx:"#0A4A80",ic:"fa-people-group"},
  "Caregiver Support & Parenting Capacity":
    {bg:"#FFE8F5",tx:"#85004D",ic:"fa-house-heart"},
  "Education & Academic Engagement":
    {bg:"#E0F5D6",tx:"#2A5C0A",ic:"fa-graduation-cap"},
  "Economic Mobility & Civic Engagement":
    {bg:"#E8F0FF",tx:"#1A3A8B",ic:"fa-briefcase"},
  "Access to Services, Basic Needs & Help-Seeking":
    {bg:"#E0F5F5",tx:"#0A5C5C",ic:"fa-hands-helping"},
  "Healthy Relationships & Gender Norms":
    {bg:"#F5E8FF",tx:"#5C0A80",ic:"fa-heart-circle-check"},
};

// ── State ────────────────────────────────────────────────────────────────
let compareSelected = [];
let openDetails = new Set();
let activeFilters = {domains:[], pops:[], reports:[], costs:[]};
let sidebarOpen = false;

// ── Mobile sidebar toggle ────────────────────────────────────────────────
function toggleSidebar(){
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar-content').classList.toggle('open', sidebarOpen);
  const icon = document.getElementById('sidebar-icon');
  icon.className = sidebarOpen ? 'fa fa-chevron-up' : 'fa fa-chevron-down';
  icon.style.fontSize = '11px';
  icon.style.color = 'var(--text-light)';
}

// On desktop, always show sidebar content
function checkLayout(){
  const isMobile = window.innerWidth <= 768;
  const content = document.getElementById('sidebar-content');
  if(!isMobile){
    content.classList.add('open');
    document.getElementById('filter-sections').className = 'filter-sections';
  }
}
window.addEventListener('resize', checkLayout);

// ── Build filter sidebar ─────────────────────────────────────────────────
function buildFilters(){
  const domains = Object.keys(DOMAIN_CONFIG);
  const pops = [...new Set(INSTRUMENT_DATA.flatMap(d => d.population_tags || []))].sort();
  const reports = [...new Set(INSTRUMENT_DATA.map(d => d.report_type).filter(Boolean))].sort();
  const costs = [...new Set(INSTRUMENT_DATA.map(d => d.cost).filter(Boolean))].sort();

  function makeGroup(containerId, items, filterKey, countFn){
    const el = document.getElementById(containerId);
    items.forEach(val => {
      const count = INSTRUMENT_DATA.filter(d => countFn(d, val)).length;
      const dc = filterKey === 'domains' ? DOMAIN_CONFIG[val] : null;
      const dot = dc
        ? `<span class="fc-dot" style="background:${dc.tx}"></span>`
        : '';
      const label = document.createElement('label');
      label.className = 'fc';
      label.innerHTML = `
        <input type="checkbox" value="${val.replace(/"/g,'&quot;')}" data-key="${filterKey}" onchange="toggleFilter('${filterKey}',this.value,this.checked)">
        ${dot}
        <span class="fc-label">${val}</span>
        <span class="fc-count">${count}</span>`;
      el.appendChild(label);
    });
  }

  makeGroup('domain-filters', domains, 'domains',
    (d,v) => (d.outcome_domains||[]).includes(v));
  makeGroup('pop-filters', pops, 'pops',
    (d,v) => (d.population_tags||[]).includes(v));
  makeGroup('report-filters', reports, 'reports',
    (d,v) => d.report_type === v);
  makeGroup('cost-filters', costs, 'costs',
    (d,v) => d.cost === v);
}

function toggleFilter(key, val, checked){
  const arr = activeFilters[key];
  if(checked) arr.push(val);
  else arr.splice(arr.indexOf(val), 1);
  render();
}

// ── Filter logic ─────────────────────────────────────────────────────────
function getFiltered(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const hideFlagged = document.getElementById('hide-flagged').checked;
  const freeOnly = document.getElementById('free-only').checked;

  return INSTRUMENT_DATA.filter(d => {
    if(q){
      const searchable = [
        d.name, d.what_it_measures, d.target_population,
        ...(d.outcome_domains||[]), d.report_type, d.construct
      ].join(' ').toLowerCase();
      if(!searchable.includes(q)) return false;
    }
    if(hideFlagged && d.flags && d.flags.length > 0) return false;
    if(freeOnly && d.cost !== 'Free') return false;
    if(activeFilters.domains.length && !( d.outcome_domains||[]).some(x => activeFilters.domains.includes(x))) return false;
    if(activeFilters.pops.length && !(d.population_tags||[]).some(x => activeFilters.pops.includes(x))) return false;
    if(activeFilters.reports.length && !activeFilters.reports.includes(d.report_type)) return false;
    if(activeFilters.costs.length && !activeFilters.costs.includes(d.cost)) return false;
    return true;
  });
}

// ── Render cards ─────────────────────────────────────────────────────────
function render(){
  const filtered = getFiltered();
  const countEl = document.getElementById('result-count');
  countEl.textContent = `${filtered.length} instrument${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('cards-grid');

  if(!filtered.length){
    grid.innerHTML = `<div class="empty-state">
      <i class="fa fa-filter-circle-xmark"></i>
      <p>No instruments match your current filters.<br>Try broadening your search or clearing some filters.</p>
    </div>`;
    updateCompareBar();
    return;
  }

  grid.innerHTML = filtered.map(inst => renderCard(inst)).join('');
  updateCompareBar();
}

function renderCard(inst){
  const isSelected = compareSelected.some(s => s.name === inst.name);
  const isOpen = openDetails.has(inst.name);
  const safeId = inst.name.replace(/[^a-z0-9]/gi, '_');

  // Domain badges — show up to 2
  const badges = (inst.outcome_domains || []).slice(0,2).map(dm => {
    const dc = DOMAIN_CONFIG[dm] || {bg:'#F1EFE8', tx:'#5F5E5A', ic:'fa-tag'};
    return `<span class="db" style="background:${dc.bg};color:${dc.tx}">
      <i class="fa ${dc.ic}"></i>${dm}
    </span>`;
  }).join('');

  // Flag note
  const flagHTML = inst.flags && inst.flags.length
    ? `<div class="flag-note"><i class="fa fa-triangle-exclamation"></i><span>${inst.flags[0]}</span></div>`
    : '';

  // Cost pill
  const isFree = inst.cost === 'Free';
  const costClass = isFree ? 'free' : 'paid';
  const costIcon = isFree ? 'fa-lock-open' : 'fa-lock';

  // Detail panel
  const detailHTML = isOpen ? `
    <div class="detail-panel" id="det_${safeId}">
      <div class="detail-row">
        <span class="detail-label">What it measures</span>
        <span class="detail-value">${inst.what_it_measures || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Items</span>
        <span class="detail-value">${inst.item_count || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Population</span>
        <span class="detail-value">${inst.target_population || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Report type</span>
        <span class="detail-value">${inst.report_type || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cost / access</span>
        <span class="detail-value">${inst.cost_access || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Citation</span>
        <span class="detail-value">${inst.citation || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Source</span>
        <span class="detail-value">${inst.source || '—'}</span>
      </div>
      ${inst.flags && inst.flags.length ? `
      <div class="detail-row">
        <span class="detail-label detail-flag">⚑ Note</span>
        <span class="detail-value detail-flag">${inst.flags.join(' ')}</span>
      </div>` : ''}
    </div>` : '';

  return `<div class="card${isSelected ? ' selected' : ''}" id="card_${safeId}">
    <div class="card-header">
      <input type="checkbox" class="card-check"
        ${isSelected ? 'checked' : ''}
        onchange="toggleCompare(this,'${inst.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"
        aria-label="Add ${inst.name} to comparison">
      <span class="card-name">${inst.name}</span>
    </div>
    <div class="domain-badges">${badges}</div>
    <p class="card-desc">${inst.what_it_measures || ''}</p>
    <div class="card-meta">
      <span class="meta-pill"><i class="fa fa-list-ol"></i>${inst.item_count || '—'}</span>
      <span class="meta-pill"><i class="fa fa-users"></i>${(inst.population_tags||[]).join(', ') || '—'}</span>
      <span class="meta-pill ${costClass}"><i class="fa ${costIcon}"></i>${inst.cost || '—'}</span>
    </div>
    ${flagHTML}
    <button class="expand-btn" onclick="toggleDetail('${inst.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
      <i class="fa ${isOpen ? 'fa-chevron-up' : 'fa-chevron-down'}"></i>
      ${isOpen ? 'Hide details' : 'Show details'}
    </button>
    ${detailHTML}
  </div>`;
}

// ── Detail expand ────────────────────────────────────────────────────────
function toggleDetail(name){
  if(openDetails.has(name)) openDetails.delete(name);
  else openDetails.add(name);
  render();
}

// ── Compare ──────────────────────────────────────────────────────────────
function toggleCompare(checkbox, name){
  const inst = INSTRUMENT_DATA.find(d => d.name === name);
  const idx = compareSelected.findIndex(s => s.name === name);
  if(idx > -1){
    compareSelected.splice(idx, 1);
  } else if(compareSelected.length < 4 && inst){
    compareSelected.push(inst);
  } else {
    checkbox.checked = false;
    return;
  }
  render();
}

function updateCompareBar(){
  const bar = document.getElementById('compare-bar');
  const btn = document.getElementById('compare-btn');
  const hint = document.getElementById('compare-hint');

  if(!compareSelected.length){ bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  document.getElementById('compare-pills').innerHTML = compareSelected.map(s =>
    `<span class="cpill">
      ${s.name.length > 32 ? s.name.slice(0,32) + '…' : s.name}
      <button onclick="removeCompare('${s.name.replace(/'/g,"\\'")}')">×</button>
    </span>`
  ).join('');

  if(compareSelected.length < 2){
    btn.disabled = true;
    btn.textContent = 'Compare';
    hint.textContent = `Select ${2 - compareSelected.length} more to compare`;
  } else {
    btn.disabled = false;
    btn.textContent = `Compare ${compareSelected.length}`;
    hint.textContent = compareSelected.length < 4 ? `(up to 4)` : '';
  }
}

function removeCompare(name){
  compareSelected = compareSelected.filter(s => s.name !== name);
  render();
}

function openCompare(){
  const fields = [
    ['What it measures','what_it_measures'],
    ['Items','item_count'],
    ['Population','target_population'],
    ['Report type','report_type'],
    ['Cost / access','cost_access'],
    ['Citation','citation'],
    ['Source','source'],
  ];

  const domainRow = `<tr>
    <td class="row-label">Domains</td>
    ${compareSelected.map(s => `<td>${
      (s.outcome_domains||[]).map(dm => {
        const dc = DOMAIN_CONFIG[dm] || {bg:'#F1EFE8',tx:'#5F5E5A',ic:'fa-tag'};
        return `<span class="db" style="background:${dc.bg};color:${dc.tx};margin:2px 2px 2px 0;display:inline-flex">
          <i class="fa ${dc.ic}"></i>${dm}
        </span>`;
      }).join('')
    }</td>`).join('')}
  </tr>`;

  const dataRows = fields.map(([label, key]) => `<tr>
    <td class="row-label">${label}</td>
    ${compareSelected.map(s => `<td>${s[key] || '—'}</td>`).join('')}
  </tr>`).join('');

  const flagRow = `<tr>
    <td class="row-label" style="color:var(--amber-tx)">⚑ Notes</td>
    ${compareSelected.map(s => `<td style="color:var(--amber-tx)">${
      s.flags && s.flags.length ? s.flags.join(' ') : 'None'
    }</td>`).join('')}
  </tr>`;

  document.getElementById('compare-body').innerHTML = `
    <table class="compare-table">
      <thead>
        <tr>
          <th></th>
          ${compareSelected.map(s => `<th>${s.name}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${domainRow}
        ${dataRows}
        ${flagRow}
      </tbody>
    </table>`;

  document.getElementById('compare-overlay').classList.add('open');
}

function closeCompare(){
  document.getElementById('compare-overlay').classList.remove('open');
}

// ── Clear all ────────────────────────────────────────────────────────────
function clearAll(){
  document.querySelectorAll('.sidebar input[type=checkbox]').forEach(c => c.checked = false);
  document.getElementById('hide-flagged').checked = false;
  document.getElementById('free-only').checked = false;
  activeFilters = {domains:[], pops:[], reports:[], costs:[]};
  compareSelected = [];
  openDetails = new Set();
  document.getElementById('search-input').value = '';
  render();
}

// ── Init ─────────────────────────────────────────────────────────────────
checkLayout();
buildFilters();
render();
</script>
</body>
</html>
